    <!-- Lightbox Modal (Hidden by default) -->
    <div id="lightbox" class="fixed inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-4 sm:p-8 cursor-pointer hidden opacity-0 transition-opacity duration-300">
        <!-- Close Instructions -->
        <p class="text-white/70 mb-4 text-sm font-light tracking-wide uppercase">Tap anywhere to close</p>
        
        <!-- Full Size Image -->
        <img id="lightbox-img" src="" alt="Full size image" class="max-w-full max-h-[85vh] rounded-lg shadow-[0_0_50px_rgba(212,175,55,0.3)] border-2 border-gold/50 object-contain">
        
        <!-- Caption -->
        <p id="lightbox-caption" class="text-gold-light mt-6 font-serif text-xl italic text-center"></p>
    </div>

    <!-- JavaScript for Lightbox functionality -->
    <script>
        const modal = document.getElementById('lightbox');
        const modalImg = document.getElementById('lightbox-img');
        const modalCaption = document.getElementById('lightbox-caption');
        const gridImages = document.querySelectorAll('.grid-img');

        // Open Lightbox
        gridImages.forEach(img => {
            img.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent immediate closing
                modalImg.src = img.src;
                modalCaption.textContent = img.alt;
                
                // Show modal
                modal.classList.remove('hidden');
                // Trigger reflow for animation
                void modal.offsetWidth;
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                
                // Disable background scrolling
                document.body.style.overflow = 'hidden';
            });
        });

        // Close Lightbox
        const closeLightbox = () => {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            
            // Wait for fade out transition before hiding completely
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            
            // Re-enable background scrolling
            document.body.style.overflow = 'auto';
        };

        // Close when clicking anywhere in the modal
        modal.addEventListener('click', closeLightbox);

        // Close on Escape key press
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeLightbox();
            }
        });
    </script>
